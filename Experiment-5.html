<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#eef2f7;">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg"
style="background:linear-gradient(to right,#1b1f24,#2f3542);">

    <div class="container">

        <a class="navbar-brand text-white fw-bold" href="#">
            TechStore
        </a>

        <button class="navbar-toggler bg-light" data-bs-toggle="collapse"
                data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="nav">

            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link text-light" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-light" href="#">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-light" href="#">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-light" href="#">Contact</a>
                </li>
            </ul>

        </div>

    </div>

</nav>

<!-- Products -->
<div class="container py-5">

    <div class="row g-4">

        <!-- Laptop -->
        <div class="col-md-4">

            <div class="card shadow rounded-4 p-3 h-100"
            style="border:none;">

                <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
                     class="card-img-top rounded-3"
                     style="height:220px; object-fit:cover;">

                <div class="card-body">

                    <h3>Laptop</h3>

                    <p class="text-secondary">
                        High performance laptop
                    </p>

                    <h5>
                        ₹50,000
                        <span class="badge bg-success">
                            New
                        </span>
                    </h5>

                    <button class="btn btn-primary mt-3">
                        View Details
                    </button>

                </div>

            </div>

        </div>

        <!-- Mobile -->
        <div class="col-md-4">

            <div class="card shadow rounded-4 p-3 h-100"
            style="border:none;">

                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
                     class="card-img-top rounded-3"
                     style="height:220px; object-fit:cover;">

                <div class="card-body">

                    <h3>Mobile</h3>

                    <p class="text-secondary">
                        Latest smartphone
                    </p>

                    <h5>
                        ₹30,000
                        <span class="badge bg-danger">
                            Sale
                        </span>
                    </h5>

                    <button class="btn btn-primary mt-3">
                        View Details
                    </button>

                </div>

            </div>

        </div>

        <!-- Headphones -->
        <div class="col-md-4">

            <div class="card shadow rounded-4 p-3 h-100"
            style="border:none;">

                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
                     class="card-img-top rounded-3"
                     style="height:220px; object-fit:cover;">

                <div class="card-body">

                    <h3>Headphones</h3>

                    <p class="text-secondary">
                        Noise cancelling
                    </p>

                    <h5>
                        ₹5,000
                        <span class="badge bg-info">
                            Popular
                        </span>
                    </h5>

                    <button class="btn btn-primary mt-3">
                        View Details
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->
<footer class="text-center py-4"
style="background:linear-gradient(to right,#1b1f24,#2f3542);
color:white;">

    © 2026 TechStore | Follow us on social media

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
