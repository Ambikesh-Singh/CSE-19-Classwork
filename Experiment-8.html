<!DOCTYPE html>
<html>
<head>
    <title>Employee Salary Management System</title>
</head>
<body style="background:#e6e6e6;
             font-family:Arial;
             display:flex;
             justify-content:center;
             align-items:center;
             min-height:100vh;">

<div style="background:white;
            width:700px;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 5px 20px gray;
            text-align:center;">

    <h1>Employee Salary Management System</h1>

    <input type="text"
           id="name"
           placeholder="Employee Name"
           style="width:250px;padding:12px;margin:8px;"><br>

    <input type="number"
           id="id"
           placeholder="Employee ID"
           style="width:250px;padding:12px;margin:8px;"><br>

    <input type="number"
           id="salary"
           placeholder="Salary"
           style="width:250px;padding:12px;margin:8px;"><br>

    <input type="text"
           id="department"
           placeholder="Department"
           style="width:250px;padding:12px;margin:8px;"><br>

    <button onclick="addEmployee()"
            style="background:#28a745;
                   color:white;
                   border:none;
                   padding:12px 20px;
                   border-radius:5px;
                   font-size:18px;
                   cursor:pointer;">
        Add Employee
    </button>

    <br><br>

    <button onclick="displayAll()" style="background:#28a745;color:white;padding:12px;border:none;border-radius:5px;margin:5px;">
        Display All
    </button>

    <button onclick="salaryAbove50000()" style="background:#28a745;color:white;padding:12px;border:none;border-radius:5px;margin:5px;">
        Salary > 50000
    </button>

    <button onclick="totalSalary()" style="background:#28a745;color:white;padding:12px;border:none;border-radius:5px;margin:5px;">
        Total Salary
    </button>

    <button onclick="averageSalary()" style="background:#28a745;color:white;padding:12px;border:none;border-radius:5px;margin:5px;">
        Average Salary
    </button>

    <button onclick="countDepartment()" style="background:#28a745;color:white;padding:12px;border:none;border-radius:5px;margin:5px;">
        Count by Department
    </button>

    <div id="output"
         style="margin-top:30px;
                text-align:left;
                font-size:18px;">
    </div>

</div>

<script>

let employees = [];

function addEmployee()
{
    let emp = {
        name: document.getElementById("name").value,
        id: document.getElementById("id").value,
        salary: Number(document.getElementById("salary").value),
        department: document.getElementById("department").value
    };

    employees.push(emp);

    alert("Employee Added Successfully!");

    document.getElementById("name").value="";
    document.getElementById("id").value="";
    document.getElementById("salary").value="";
    document.getElementById("department").value="";
}

function displayAll()
{
    let result="<h2>Employee List</h2>";

    employees.forEach(emp=>{
        result += `
        <p>
        Name : ${emp.name}<br>
        ID : ${emp.id}<br>
        Salary : ₹${emp.salary}<br>
        Department : ${emp.department}
        </p><hr>`;
    });

    document.getElementById("output").innerHTML=result;
}

function salaryAbove50000()
{
    let result="<h2>Salary > 50000</h2>";

    employees
    .filter(emp=>emp.salary>50000)
    .forEach(emp=>{
        result += `${emp.name} - ₹${emp.salary}<br>`;
    });

    document.getElementById("output").innerHTML=result;
}

function totalSalary()
{
    let total = employees.reduce((sum,emp)=>sum+emp.salary,0);

    document.getElementById("output").innerHTML=
    `<h2>Total Salary = ₹${total}</h2>`;
}

function averageSalary()
{
    let total = employees.reduce((sum,emp)=>sum+emp.salary,0);

    let avg = total/employees.length;

    document.getElementById("output").innerHTML=
    `<h2>Average Salary = ₹${avg.toFixed(2)}</h2>`;
}

function countDepartment()
{
    let count = {};

    employees.forEach(emp=>{
        count[emp.department]=(count[emp.department]||0)+1;
    });

    let result="<h2>Department Count</h2>";

    for(let dept in count)
    {
        result += `${dept} : ${count[dept]}<br>`;
    }

    document.getElementById("output").innerHTML=result;
}

</script>

</body>
</html>
